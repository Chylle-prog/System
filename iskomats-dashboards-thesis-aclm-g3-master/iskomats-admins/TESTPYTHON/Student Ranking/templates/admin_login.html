{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 3em auto; padding: 2em; border: 1px solid #ddd; border-radius: 8px; background-color: #f9f9f9;">
    <h1 style="text-align:center; margin-top:0;">Full Admin Login</h1>
    
    <form method="post">
        <p>
            <label for="password" style="display:block; margin-bottom:0.5em; font-weight:bold;">Password:</label>
            <input type="password" id="password" name="password" required autofocus style="padding:10px; width:100%; box-sizing:border-box; font-size:1em;">
        </p>
        <p style="text-align:center; margin-top:1.5em;">
            <button type="submit" style="padding:10px 24px; font-size:1.1em; background-color:#0066cc; color:white; border:none; border-radius:4px; cursor:pointer;">Login</button>
        </p>
    </form>

    <hr style="margin: 2em 0;">
    
    <p style="text-align:center; font-size:0.9em;">
        <a href="{{ url_for('landing') }}">← Back to Home</a>
    </p>
</div>
{% endblock %}
