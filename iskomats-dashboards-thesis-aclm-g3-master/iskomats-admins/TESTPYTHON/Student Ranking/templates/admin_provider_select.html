{% extends "base.html" %}

{% block title %}Select Scholarship Provider{% endblock %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
  <h1>Select Provider</h1>
  {% if is_logged_in %}
    <a href="{{ logout_url }}" style="background: #e74c3c; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none;">Logout</a>
  {% endif %}
</div>

{% if providers %}
<form method="post">
    <p>
        <label for="pro_no">Scholarship Provider:</label><br>
        <select name="pro_no" id="pro_no" required style="padding:10px; width:420px; font-size:1.1em;">
            <option value="">── Choose provider ──</option>
            {% for prov in providers %}
            <option value="{{ prov.pro_no }}">{{ prov.provider_name }}</option>
            {% endfor %}
        </select>
    </p>
    <p>
        <button type="submit" style="padding:10px 24px; font-size:1.1em;">Continue →</button>
    </p>
</form>

<p style="margin-top:2em; font-size:0.95em;">
    <a href="{{ url_for('admin_login') }}">Full admin login (see all providers)</a>
</p>
{% else %}
<p><em>No providers found in the database.</em></p>
{% endif %}

{% endblock %}
