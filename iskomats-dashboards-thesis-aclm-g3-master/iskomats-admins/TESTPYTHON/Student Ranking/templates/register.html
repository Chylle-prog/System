<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Applicant Registration + Face Verification</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; }
    h1 { text-align: center; color: #2c3e50; }
    form { background: #f9f9f9; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    label { display: block; margin: 20px 0 8px; font-weight: bold; }
    input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    button { background: #3498db; color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
    button:hover { background: #2980b9; }
    button.clear-btn { background: #e74c3c; }
    button.clear-btn:hover { background: #c0392b; }
    #videoContainer, #preview { margin: 20px 0; text-align: center; }
    video, canvas, img { max-width: 100%; border: 2px solid #ddd; border-radius: 8px; }
    #signature-pad { border: 2px solid #ddd; background: white; width: 100%; height: 200px; margin: 10px 0; cursor: crosshair; border-radius: 5px; }
    .message { margin: 20px 0; padding: 15px; border-radius: 5px; font-weight: bold; }
    .success { background: #d4edda; color: #155724; }
    .error   { background: #f8d7da; color: #721c24; }
    .loading-overlay {position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.65); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: white; font-size: 1.3rem;}
    .loading-spinner { width: 70px; height: 70px; border: 8px solid #f3f3f3; border-top: 8px solid #3498db; border-radius: 50%; animation: spin 1.1s linear infinite; margin-bottom: 20px;}
    @keyframes spin {0%   { transform: rotate(0deg); } 100% { transform: rotate(360deg); }}
    .loading-overlay p { margin: 10px 0; text-align: center; line-height: 1.5;}
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
    @media (max-width: 768px) {
      body { max-width: 100%; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="loadingOverlay" class="loading-overlay" style="display: none;">
  <div class="loading-spinner"></div>
  <p>Processing your application...<br>Please wait</p>
</div>

<h1>Applicant Registration with Face Verification</h1>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, msg in messages %}
      <div class="message {{ category }}">{{ msg|safe }}</div>
    {% endfor %}
  {% endif %}
{% endwith %}

<form id="registrationForm" action="/submit" method="POST" enctype="multipart/form-data">

<input type="hidden" name="req_no" value="{{ req_no if req_no else '' }}">

  <label for="overall_gpa">Overall GPA (0-100):</label>
  <input type="number" id="overall_gpa" name="overall_gpa" step="1" min="0" max="100" value="{{ gpa if gpa else '' }}" required>

  <label for="financial_income_of_parents">Annual Family Income (PHP):</label>
  <input type="number" id="financial_income_of_parents" name="financial_income_of_parents" min="0" value="{{ income if income else '' }}" required>

  <label for="address">Address:</label>
  <textarea id="address" name="address" rows="3" required placeholder="Street, Barangay, City, Province"></textarea>

  <label for="mother_fname">Mother's First Name:</label>
  <input type="text" id="mother_fname" name="mother_fname">

  <label for="mother_lname">Mother's Last Name:</label>
  <input type="text" id="mother_lname" name="mother_lname">

  <label for="father_fname">Father's First Name:</label>
  <input type="text" id="father_fname" name="father_fname">

  <label for="father_lname">Father's Last Name:</label>
  <input type="text" id="father_lname" name="father_lname">

  <label for="id_image">Upload Photo ID (JPG/PNG):</label>
  <input type="file" id="id_image" name="id_image" accept="image/jpeg,image/png" required onchange="previewID(this)">

  <div id="preview"></div>

  <label>Step 2: Live Face Capture (selfie)</label>

  <div id="videoContainer">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <br><br>
    <button type="button" id="startCamera">Start Camera</button>
    <button type="button" id="capture" disabled>Take Live Photo</button><br><br>
  </div>
  <input type="hidden" id="live_photo" name="live_photo">

  <label>Step 3: Sign Below (Signature)</label>
  <canvas id="signature-pad"></canvas>
  <button type="button" class="clear-btn" id="clearSignature">Clear Signature</button><br><br>
  <input type="hidden" id="signature_data" name="signature_data">

  <button type="submit" id="submitBtn" disabled>Submit Application</button>
  <a href="{{ url_for('cancel_application') }}" style="margin-left:10px; background:#aaa; color:white; padding:10px 20px; border:none; border-radius:5px; text-decoration:none; display:inline-block; text-align:center;">
    Cancel Application
  </a>
</form>
<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const captureBtn = document.getElementById('capture');
const startBtn = document.getElementById('startCamera');
const liveInput = document.getElementById('live_photo');
const submitBtn = document.getElementById('submitBtn');

let stream = null;

startBtn.onclick = async () => {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    captureBtn.disabled = false;
    startBtn.disabled = true;
  } catch (err) {
    alert("Camera access denied or not available.\n" + err.message);
  }
};

captureBtn.onclick = () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
  liveInput.value = dataUrl;

  const img = document.createElement('img');
  img.src = dataUrl;
  img.width = 320;
  document.getElementById('videoContainer').appendChild(img);
  submitBtn.disabled = false;
  captureBtn.disabled = true;
};

function previewID(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.createElement('img');
      img.src = e.target.result;
      img.width = 320;
      document.getElementById('preview').innerHTML = '';
      document.getElementById('preview').appendChild(img);
    };
    reader.readAsDataURL(input.files[0]);
  }
}

const signaturePad = document.getElementById('signature-pad');
const signatureCtx = signaturePad.getContext('2d');
let isDrawingSignature = false;

signaturePad.width = signaturePad.offsetWidth;
signaturePad.height = 200;

function getSigPosition(e) {
  const rect = signaturePad.getBoundingClientRect();
  const clientX = e.clientX || (e.touches && e.touches[0].clientX);
  const clientY = e.clientY || (e.touches && e.touches[0].clientY);
  return {
    x: clientX - rect.left,
    y: clientY - rect.top
  };
}

function startSigDrawing(e) {
  e.preventDefault();
  const pos = getSigPosition(e);
  signatureCtx.beginPath();
  signatureCtx.moveTo(pos.x, pos.y);
  isDrawingSignature = true;
  signatureCtx.lineTo(pos.x, pos.y);
  signatureCtx.stroke();
}

function drawSignature(e) {
  e.preventDefault();
  if (!isDrawingSignature) return;

  const pos = getSigPosition(e);
  signatureCtx.lineTo(pos.x, pos.y);
  signatureCtx.stroke();
}

function endSigDrawing() {
  isDrawingSignature = false;
}

signatureCtx.lineWidth = 2;
signatureCtx.lineCap = 'round';
signatureCtx.lineJoin = 'round';
signatureCtx.strokeStyle = 'black';

signaturePad.addEventListener('mousedown', startSigDrawing);
signaturePad.addEventListener('mousemove', drawSignature);
signaturePad.addEventListener('mouseup', endSigDrawing);
signaturePad.addEventListener('mouseleave', endSigDrawing);

signaturePad.addEventListener('touchstart', startSigDrawing);
signaturePad.addEventListener('touchmove', drawSignature);
signaturePad.addEventListener('touchend', endSigDrawing);
signaturePad.addEventListener('touchcancel', endSigDrawing);

document.getElementById('clearSignature').addEventListener('click', (e) => {
  e.preventDefault();
  signatureCtx.clearRect(0, 0, signaturePad.width, signaturePad.height);
  document.getElementById('signature_data').value = '';
});

document.getElementById('registrationForm').addEventListener('submit', () => {
  const sigDataInput = document.getElementById('signature_data');
  if (sigDataInput.value === '') {
    const dataUrl = signaturePad.toDataURL('image/png');
    sigDataInput.value = dataUrl;
  }
});

document.getElementById('registrationForm').addEventListener('submit', function() {
  if (!this.checkValidity()) {
    return;
  }

  document.getElementById('loadingOverlay').style.display = 'flex';
  document.getElementById('submitBtn').disabled = true;
});

window.addEventListener('load', () => {
  if (document.querySelector('.message.error, .message.success')) {
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('submitBtn').disabled = false;
  }
});
</script>
</body>
</html>
