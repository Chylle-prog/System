<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Provider Registration - Scholarship Management</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 480px; margin: 80px auto; padding: 20px; background: #f8f9fa; }
    h1 { text-align: center; color: #2c3e50; }
    form { background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    label { display: block; margin: 15px 0 6px; font-weight: bold; color: #444; }
    input { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; margin-bottom: 5px; }
    button { background: #27ae60; color: white; padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1em; margin-top: 25px; width: 100%; }
    button:hover { background: #219653; }
    .links { text-align: center; margin-top: 25px; }
    .links a { margin: 0 15px; color: #27ae60; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .message { padding: 15px; border-radius: 6px; margin: 15px 0; }
    .error { background: #f2dede; color: #a94442; }
    .success { background: #dff0d8; color: #3c763d; }
  </style>
</head>
<body>
  <h1>Create Provider Account</h1>
  <form method="post">
    <label for="provider_name">Organization/Provider Name</label>
    <input type="text" id="provider_name" name="provider_name" required placeholder="Your organization name">

    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" required placeholder="provider@example.com">

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>

    <label for="password_confirm">Confirm Password</label>
    <input type="password" id="password_confirm" name="password_confirm" required>

    <button type="submit">Create Account</button>
  </form>

  <div class="links">
    <a href="{{ url_for('landing') }}">← Back to Home</a>
    <br><br>
    Already have an account? <a href="{{ url_for('provider_login') }}">Log in here</a>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, msg in messages %}
        <div class="message {{ category }}">{{ msg|safe }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
</body>
</html>
