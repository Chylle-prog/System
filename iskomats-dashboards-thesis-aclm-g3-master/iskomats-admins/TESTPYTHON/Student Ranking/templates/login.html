<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Scholarship Portal</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 480px; margin: 80px auto; padding: 20px; background: #f8f9fa; }
    h1 { text-align: center; color: #2c3e50; }
    form { background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    label { display: block; margin: 15px 0 6px; font-weight: bold; color: #444; }
    input { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; }
    button { background: #3498db; color: white; padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1em; margin-top: 25px; width: 100%; }
    button:hover { background: #2980b9; }
    .back { text-align: center; margin-top: 25px; }
    .message { padding: 15px; border-radius: 6px; margin: 20px 0; }
    .success { background: #dff0d8; color: #3c763d; }
    .error-msg { background: #f2dede; color: #a94442; }
  </style>
</head>
<body>
  <h1>Login</h1>
  <form method="post">
    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" required placeholder="yourname@example.com">

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>

    <button type="submit">Sign In</button>
  </form>

  <div class="back">
    <a href="{{ url_for('landing') }}">&larr; Back to Home</a>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, msg in messages %}
        <div class="message {{ category }}">{{ msg|safe }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
</body>
</html>
