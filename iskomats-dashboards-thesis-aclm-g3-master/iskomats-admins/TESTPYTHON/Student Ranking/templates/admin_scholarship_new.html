{% extends "base.html" %}

{% block title %}New Scholarship{% endblock %}

{% block content %}
<h1>Create New Scholarship Program</h1>

<p style="margin-bottom: 2em;">
    <a href="{{ url_for('admin_choose_scholarship') }}">← Back to scholarship list</a>
</p>

<form method="post" style="max-width: 640px; line-height: 1.6;">
    <div style="margin-bottom: 1.4em;">
        <label for="scholarship_name"><strong>Scholarship Name <span style="color:red;">*</span></strong></label><br>
        <input type="text" name="scholarship_name" id="scholarship_name" 
               value="{{ request.form.scholarship_name or '' }}" required 
               style="width:100%; padding:9px; font-size:1em; margin-top:0.3em;">
    </div>

    <div style="margin-bottom: 1.4em;">
        <label for="gpa">Minimum GPA (optional, e.g. 80)</label><br>
        <input type="number" step="1" min="0" max="100" name="gpa" id="gpa" 
               value="{{ request.form.gpa or '' }}" 
               style="width:100%; padding:9px; font-size:1em; margin-top:0.3em;">
    </div>

    <div style="margin-bottom: 1.4em;">
        <label for="parent_finance">Maximum Parent Income (₱, optional – no limit if blank)</label><br>
        <input type="number" step="1" name="parent_finance" id="parent_finance" 
               value="{{ request.form.parent_finance or '' }}" 
               style="width:100%; padding:9px; font-size:1em; margin-top:0.3em;">
    </div>

    <div style="margin-bottom: 1.4em;">
        <label for="location">Required Location / Address Keyword (optional)</label><br>
        <input type="text" name="location" id="location" 
               value="{{ request.form.location or '' }}" 
               style="width:100%; padding:9px; font-size:1em; margin-top:0.3em;">
    </div>

    <div style="margin-bottom: 1.4em;">
        <label for="slots">Number of Slots (optional)</label><br>
        <input type="number" min="1" name="slots" id="slots" 
               value="{{ request.form.slots or '' }}" 
               style="width:100%; padding:9px; font-size:1em; margin-top:0.3em;">
    </div>

    <div style="margin-bottom: 1.8em;">
        <label for="deadline"><strong>Application Deadline <span style="color:red;">*</span></strong></label><br>
        <input type="date" name="deadline" id="deadline" 
               value="{{ request.form.deadline or '' }}" required
               style="width:100%; padding:9px; font-size:1em; margin-top:0.3em;">
    </div>

    {% if is_full_admin %}
    <div style="margin-bottom: 1.8em;">
        <label for="provider"><strong>Provider <span style="color:red;">*</span></strong></label><br>
        <input type="text" name="provider" id="provider" 
               value="{{ request.form.provider or selected_provider or '' }}" required 
               style="width:100%; padding:9px; font-size:1em; margin-top:0.3em;">
    </div>
    {% else %}
    <div style="margin-bottom: 1.8em; font-style: italic; color: #555;">
        Provider: <strong>{{ selected_provider }}</strong> (fixed for current view)
    </div>
    {% endif %}

    <div style="margin-top: 2em;">
        <button type="submit" 
                style="padding:12px 32px; font-size:1.1em; background:#28a745; color:white; 
                       border:none; border-radius:5px; cursor:pointer;">
            Create Scholarship
        </button>
    </div>
</form>

{% endblock %}
