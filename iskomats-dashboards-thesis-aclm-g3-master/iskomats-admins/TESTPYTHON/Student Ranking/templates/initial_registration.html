<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    h1 { text-align: center; color: #2c3e50; }
    form { background: #f9f9f9; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    label { display: block; margin: 20px 0 8px; font-weight: bold; }
    input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    button { background: #27ae60; color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
    button:hover { background: #219653; }
    .message { margin: 20px 0; padding: 15px; border-radius: 5px; font-weight: bold; }
    .success { background: #d4edda; color: #155724; }
    .error   { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>

<h1>Create Your Account</h1>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, msg in messages %}
      <div class="message {{ category }}">{{ msg|safe }}</div>
    {% endfor %}
  {% endif %}
{% endwith %}

<form action="{{ url_for('register') }}" method="POST" style="max-width: 500px;">

  <label for="first_name">First Name:</label>
  <input type="text" id="first_name" name="first_name" required>

  <label for="middle_name">Middle Name:</label>
  <input type="text" id="middle_name" name="middle_name">

  <label for="last_name">Last Name:</label>
  <input type="text" id="last_name" name="last_name" required>

  <label for="email">Email Address:</label>
  <input type="email" id="email" name="email" required>

  <label for="password">Password:</label>
  <input type="password" id="password" name="password" required>

  <label for="password_confirm">Confirm Password:</label>
  <input type="password" id="password_confirm" name="password_confirm" required>

  <button type="submit" style="width: 100%; margin-top: 20px;">Create Account &amp; Continue</button>
  <a href="{{ url_for('landing') }}" style="margin-top: 10px; background:#aaa; color:white; padding:10px 20px; border:none; border-radius:5px; text-decoration:none; display:block; text-align:center;">
    Cancel
  </a>

</form>

</body>
</html>
